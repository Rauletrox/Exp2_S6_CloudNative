spring.application.name=gestiondepedidosyguias

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/guiasdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:spring}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:spring123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost/mock-issuer}

app.security.mock-jwt=${APP_SECURITY_MOCK_JWT:true}

app.aws.region=${AWS_REGION:us-east-1}
app.aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:mi-bucket-guias}
